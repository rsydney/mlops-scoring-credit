name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check API imports correctly
        run: |
          python -c "from app import app; print('API importée avec succès ✅')"

      - name: Run business score tests
        run: |
          python -c "
          import numpy as np
          from business_score import business_cost, business_score_normalized

          y_true = np.array([0, 1, 0, 1, 1])
          y_pred = np.array([0, 1, 1, 0, 1])

          cost = business_cost(y_true, y_pred)
          assert cost > 0, 'Le coût métier doit être positif'
          print('Test business_score.py réussi ✅')
          "